"Invalid credentials.": "Identifiants invalides."
"Invalid or expired login link.": "Lien de connexion invalide ou expiré."
"Too many failed login attempts, please try again later.": "Trop de tentatives de connexion, veuillez réessayer plus tard."
"Account is disabled.": "Ce compte est désactivé."
"Account is locked.": "Ce compte est verrouillé."
"Account has expired.": "Ce compte a expiré."
"Credentials have expired.": "Les identifiants ont expiré."
"Cookie has already been used by someone else.": "Ce cookie a déjà été utilisé."
"Not privileged to request the resource.": "Vous n'avez pas les droits pour accéder à cette ressource."
"Invalid CSRF token.": "Jeton CSRF invalide, veuillez réessayer."
"No authentication provider found to support the authentication token.": "Aucun fournisseur d'authentification trouvé."
"No session available, it either timed out or cookies are not enabled.": "Aucune session disponible, elle a expiré ou les cookies sont désactivés."
"An authentication exception occurred.": "Une erreur d'authentification est survenue."
"Authentication credentials could not be found.": "Les identifiants d'authentification sont introuvables."
"Authentication request could not be processed due to a system problem.": "La requête d'authentification n'a pas pu être traitée en raison d'un problème système."
